<nav mat-tab-nav-bar [tabPanel]="tabPanel" mat-stretch-tabs="false">
  <a
    mat-tab-link
    *ngFor="let link of links"
    [attr.data-test]="link"
    [routerLink]="link"
    (click)="activeLink = link"
    [active]="activeLink == link"
    >{{ link }}</a
  >
</nav>
<mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
