<div class="top-button-row">
  <button
    data-test="new-employee-button"
    mat-raised-button
    color="primary"
    (click)="onAddNew()"
  >
    New
  </button>
</div>
<div>
  <mat-list *ngIf="employees$ | async as employees">
    <mat-list-item
      data-test="employee-list-item"
      *ngFor="let employee of employees"
    >
      {{ employee.firstName }} {{ employee.lastName }}
    </mat-list-item>
  </mat-list>
</div>
